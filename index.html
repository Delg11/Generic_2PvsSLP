<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Performance Profile Viewer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen overflow-hidden text-gray-800">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        function App() {
            const [data, setData] = useState([]);
            const [metric, setMetric] = useState('Time_ms');
            const [loadingState, setLoadingState] = useState('Baixando dados do GitHub...');
            const plotDivRef = useRef(null);

            const [filters, setFilters] = useState({});

            const processDataAndFilters = (rows) => {
                const uniqueVariants = [...new Set(rows.map(r => r.Variant))].filter(Boolean);
                const newFilters = { alg: {}, sar: {}, ph: {}, atr: {}, rru: {}, sqp: {} };

                uniqueVariants.forEach(v => {
                    const alg = v.includes('2P') ? '2P' : 'UNIF';
                    const sar = (v.includes('SAR1') || v.includes('BASE')) ? '1' : '0';
                    const ph = v.includes('PH1') ? '1' : '0';
                    const atr = v.includes('ATR1') ? '1' : '0';
                    const rru = v.includes('2P') ? (v.includes('RRU1') ? '1' : '0') : 'N/A';
                    
                    let sqp = 'NONE';
                    if (v.includes('IDENTITY')) sqp = 'IDENTITY';
                    if (v.includes('SPECTRAL')) sqp = 'SPECTRAL';
                    if (v.includes('EXACT')) sqp = 'EXACT';

                    newFilters.alg[alg] = true;
                    newFilters.sar[sar] = true;
                    newFilters.ph[ph] = true;
                    newFilters.atr[atr] = true;
                    newFilters.rru[rru] = true;
                    newFilters.sqp[sqp] = true;
                });

                setData(rows);
                setFilters(newFilters);
                setLoadingState('');
            };

            // Auto-load dos CSVs diretos do repositório GitHub
            useEffect(() => {
                const loadData = () => {
                    // Usando as URLs RAW do GitHub
                    const files = [
                        'https://raw.githubusercontent.com/Delg11/Generic_2PvsSLP/main/data/benchmark_slp.csv',
                        'https://raw.githubusercontent.com/Delg11/Generic_2PvsSLP/main/data/benchmark_twophase.csv'
                    ];
                    
                    let allRows = [];
                    let filesProcessed = 0;
                    let hasError = false;

                    files.forEach(fileUrl => {
                        Papa.parse(fileUrl, {
                            download: true,
                            header: true,
                            skipEmptyLines: true,
                            complete: (results) => {
                                allRows = [...allRows, ...results.data];
                                filesProcessed++;
                                if (filesProcessed === files.length && !hasError) {
                                    processDataAndFilters(allRows);
                                }
                            },
                            error: (err) => {
                                hasError = true;
                                setLoadingState(`Falha ao conectar com o GitHub. Use o upload manual.`);
                            }
                        });
                    });
                };
                loadData();
            }, []);

            // Fallback: Upload manual
            const handleFileUpload = (event) => {
                const files = Array.from(event.target.files);
                if (files.length === 0) return;

                setData([]);
                setFilters({});
                setLoadingState('Processando upload...');
                let allRows = [];
                let filesProcessed = 0;

                files.forEach(file => {
                    Papa.parse(file, {
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => {
                            allRows = [...allRows, ...results.data];
                            filesProcessed++;
                            if (filesProcessed === files.length) {
                                processDataAndFilters(allRows);
                            }
                        }
                    });
                });
            };

            const chartData = useMemo(() => {
                if (data.length === 0 || Object.keys(filters).length === 0) return null;

                const problems = [...new Set(data.map(d => d.Problem))].filter(Boolean);
                const allVariants = [...new Set(data.map(d => d.Variant))].filter(Boolean);

                const activeVariants = allVariants.filter(v => {
                    const alg = v.includes('2P') ? '2P' : 'UNIF';
                    const sar = (v.includes('SAR1') || v.includes('BASE')) ? '1' : '0';
                    const ph = v.includes('PH1') ? '1' : '0';
                    const atr = v.includes('ATR1') ? '1' : '0';
                    const rru = v.includes('2P') ? (v.includes('RRU1') ? '1' : '0') : 'N/A';
                    
                    let sqp = 'NONE';
                    if (v.includes('IDENTITY')) sqp = 'IDENTITY';
                    if (v.includes('SPECTRAL')) sqp = 'SPECTRAL';
                    if (v.includes('EXACT')) sqp = 'EXACT';

                    return filters.alg[alg] && filters.sar[sar] && filters.ph[ph] && 
                           filters.atr[atr] && filters.rru[rru] && filters.sqp[sqp];
                });

                if (activeVariants.length === 0 || problems.length === 0) return null;

                const perf = {};
                problems.forEach(p => perf[p] = {});
                
                data.forEach(d => {
                    if (d.Status === 'KKT_OK' && activeVariants.includes(d.Variant)) {
                        const val = parseFloat(d[metric].replace(',', '.'));
                        if (!isNaN(val) && val > 0) {
                            perf[d.Problem][d.Variant] = val;
                        }
                    }
                });

                const mins = {};
                problems.forEach(p => {
                    let min = Infinity;
                    activeVariants.forEach(v => {
                        if (perf[p][v] !== undefined) min = Math.min(min, perf[p][v]);
                    });
                    mins[p] = min;
                });

                let globalMaxTau = 1;

                const traces = activeVariants.map(v => {
                    let ratios = [];
                    problems.forEach(p => {
                        if (perf[p][v] !== undefined && mins[p] !== Infinity) ratios.push(perf[p][v] / mins[p]);
                    });
                    
                    ratios.sort((a, b) => a - b);
                    if (ratios.length > 0) globalMaxTau = Math.max(globalMaxTau, ratios[ratios.length - 1]);

                    const x_vals = [1.0];
                    const y_vals = [0.0];
                    const n_probs = problems.length;

                    ratios.forEach((r, idx) => {
                        x_vals.push(r);
                        y_vals.push((idx + 1) / n_probs);
                    });

                    const variantName = v.replace('BASE_', 'BASE ').replace(/SLP/g, 'UNIF');

                    return {
                        x: x_vals, 
                        y: y_vals, 
                        mode: 'lines', 
                        type: 'scatter',
                        name: variantName,
                        line: { shape: 'hv', width: 2.5 },
                        hovertemplate: `<b>${variantName}</b><br>τ: %{x:.2f}<br>Resolvidos: %{y:.2%}<extra></extra>`,
                        n_solved: ratios.length, 
                        n_probs: n_probs
                    };
                });

                const plotLimit = Math.max(10, globalMaxTau * 1.2);
                traces.forEach(t => {
                    if (t.x.length > 0) {
                        t.x.push(plotLimit);
                        t.y.push(t.n_solved / t.n_probs);
                    }
                });

                return traces;
            }, [data, metric, filters]);

            useEffect(() => {
                if (chartData && plotDivRef.current) {
                    const layout = {
                        title: `Performance Profile (${metric})`,
                        xaxis: { type: 'log', title: 'Performance Ratio (τ)', tickformat: '.1f' },
                        yaxis: { title: 'Fraction of Solved Problems', range: [0, 1.05] },
                        hovermode: 'closest', 
                        hoverlabel: { namelength: -1 }, 
                        uirevision: 'true', 
                        margin: { l: 60, r: 30, t: 50, b: 50 },
                        showlegend: true, 
                        legend: { orientation: 'v', x: 1.02, y: 1 }
                    };
                    const config = { responsive: true, displayModeBar: true, displaylogo: false, modeBarButtonsToRemove: ['lasso2d', 'select2d'] };
                    Plotly.react(plotDivRef.current, chartData, layout, config);
                } else if (plotDivRef.current) {
                    Plotly.purge(plotDivRef.current);
                }
            }, [chartData, metric]);

            const handleFilterChange = (category, key) => {
                setFilters(prev => ({
                    ...prev, [category]: { ...prev[category], [key]: !prev[category][key] }
                }));
            };

            const CheckboxGroup = ({ title, category }) => {
                if (!filters[category] || Object.keys(filters[category]).length === 0) return null;
                
                return (
                    <div className="mb-4 border-b pb-2">
                        <h3 className="font-semibold text-sm uppercase text-gray-600 mb-2">{title}</h3>
                        <div className="flex flex-wrap gap-2">
                            {Object.keys(filters[category]).map(k => (
                                <label key={k} className="flex items-center space-x-1 text-sm bg-white px-2 py-1 rounded shadow-sm border cursor-pointer hover:bg-gray-50">
                                    <input 
                                        type="checkbox" 
                                        checked={filters[category][k]} 
                                        onChange={() => handleFilterChange(category, k)} 
                                        className="rounded border-gray-300 text-blue-600 focus:ring-blue-500" 
                                    />
                                    <span>{k}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex h-full font-sans">
                    <div className="w-1/4 min-w-[300px] bg-gray-100 p-4 border-r overflow-y-auto flex flex-col">
                        <h1 className="text-xl font-bold text-gray-800 mb-6">Bench Dashboard</h1>
                        
                        <div className="mb-6 bg-white p-3 rounded-lg shadow-sm border border-gray-200">
                            <label className="block text-sm font-medium text-gray-700 mb-2">Upload Manual (Fallback)</label>
                            <input type="file" multiple accept=".csv" onChange={handleFileUpload} className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
                        </div>

                        <div className="mb-6">
                            <h3 className="font-semibold text-sm uppercase text-gray-600 mb-2">Métrica</h3>
                            <select value={metric} onChange={(e) => setMetric(e.target.value)} className="w-full border-gray-300 rounded shadow-sm p-2 text-sm focus:ring-blue-500 focus:border-blue-500">
                                <option value="Time_ms">Tempo (ms)</option>
                                <option value="Iterations">Iterações</option>
                            </select>
                        </div>

                        {Object.keys(filters).length > 0 && (
                            <div className="flex-1">
                                <CheckboxGroup title="Algorithm" category="alg" />
                                <CheckboxGroup title="Ared/Pred Ratio (SAR)" category="sar" />
                                <CheckboxGroup title="Parabolic Step (PH)" category="ph" />
                                <CheckboxGroup title="Anisotropic Region (ATR)" category="atr" />
                                <CheckboxGroup title="2P Ratio Update (RRU)" category="rru" />
                                <CheckboxGroup title="SQP Hessian Strategy" category="sqp" />
                            </div>
                        )}
                    </div>

                    <div className="flex-1 bg-white relative p-4 flex items-center justify-center">
                        {data.length === 0 ? (
                            <div className="text-gray-400 text-lg flex flex-col items-center text-center">
                                <svg className="w-16 h-16 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                {loadingState}
                            </div>
                        ) : (
                            <div ref={plotDivRef} className="w-full h-full"></div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
